aid: coupang
name: Coupang
x-type: company
description: >-
  Coupang is a South Korean e-commerce company offering rapid delivery of a wide
  range of products including groceries, electronics, fashion, and household
  goods through its mobile app and website. Coupang exposes an Open API platform
  for marketplace sellers (vendors) to integrate product catalog, order, return,
  cancellation, settlement, and inquiry workflows.
